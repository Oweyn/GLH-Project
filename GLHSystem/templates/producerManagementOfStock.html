{% extends "base.html" %}
{% block body_block %}
<h1>Manage your Inventory</h1>

<ul class="product-list alternativeblock">
<div class="container">
<div class="row">

<!--Show producer items-->
  {% for product in producers_products %}
<div class="col-sm-6 col-md-4 col-lg-3 mb-4 block">
    <li class="product-item">
        <img src="{{ product.image.url }}" alt="{{ product.name }}" width="100">
      </a>
      <h2>{{ product.name }}</h2>
      <p>{{ product.description }}</p>
      <p>Price: £{{ product.price }}</p>

      <!--Allows the producer to increase and decrease stock there items-->
      <p><a href="{% url 'decreaseProductStock' product.pk %}"><button class="bi bi-dash"></button></a>
         {{ product.stock }} avaliable 
         <a href="{% url 'increaseProductStock' product.pk %}"><button class="bi bi-plus-lg"></button></a></p>
    </li>
    </div>
  {% endfor %}
  </div>
  </div>
  </ul>
{% endblock %}
