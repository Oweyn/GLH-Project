{% extends 'base.html' %}
{% block body_block %}

<div class="row block">
  <div class="col-md-5">
    <h1 class="mb-4">Log out</h1>
    <p>Are you sure you want to log out?</p>

    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger w-100">Log Out</button>
    </form>

    <a href="{% url 'index' %}" class="btn btn-secondary w-100 mt-2">Cancel</a>
  </div>
</div>

{% endblock %}
